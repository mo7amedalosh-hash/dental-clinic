services:
  - type: web
    name: dental-clinic
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:10000 --worker-class sync --workers 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dental-clinic-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: dental-clinic-db
    plan: free
