{% extends "base.html" %}
{% block title %}تسجيل الدخول - عيادة الأسنان{% endblock %}
{% block navbar %}{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <i class="bi bi-heart-pulse-fill text-primary" style="font-size: 3.5rem;"></i>
            <h2 class="mt-2 fw-bold">نظام إدارة عيادة الأسنان</h2>
            <p class="text-muted">تسجيل الدخول</p>
        </div>
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">اسم المستخدم</label>
                        <input type="text" name="username" class="form-control form-control-lg"
                               placeholder="reception أو doctor" required autofocus dir="ltr">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">كلمة المرور</label>
                        <input type="password" name="password" class="form-control form-control-lg"
                               placeholder="******" required dir="ltr">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="bi bi-box-arrow-in-left"></i> دخول
                    </button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3 text-muted small">
            <i class="bi bi-info-circle"></i> النظام يعمل على الشبكة المحلية
        </div>
        <div class="text-center mt-2 text-primary small fw-bold">
            <i class="bi bi-wifi"></i> IP: <span dir="ltr">{{ server_ip }}:5000</span>
        </div>
        <div class="text-center text-success small">
            <i class="bi bi-display"></i> اسم الجهاز: <span dir="ltr">{{ server_hostname }}:5000</span>
        </div>
    </div>
</div>
{% endblock %}
